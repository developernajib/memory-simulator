<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="TaskMgr Memory Simulator">
  <!-- Wordmark lockup for the Memory Simulator, matching the in-app theme. -->
  <defs>
    <linearGradient id="chipBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b22" />
      <stop offset="1" stop-color="#12161c" />
    </linearGradient>
  </defs>

  <rect width="320" height="96" rx="16" fill="#0d0f12" />

  <!-- chip mark -->
  <g transform="translate(20 20)">
    <rect x="7" y="7" width="42" height="42" rx="8" fill="url(#chipBody)" stroke="#2d3748" stroke-width="1.5" />
    <g fill="#374151">
      <rect x="16" y="0" width="3.5" height="7" rx="1" />
      <rect x="26" y="0" width="3.5" height="7" rx="1" />
      <rect x="36" y="0" width="3.5" height="7" rx="1" />
      <rect x="16" y="49" width="3.5" height="7" rx="1" />
      <rect x="26" y="49" width="3.5" height="7" rx="1" />
      <rect x="36" y="49" width="3.5" height="7" rx="1" />
      <rect x="0" y="16" width="7" height="3.5" rx="1" />
      <rect x="0" y="26" width="7" height="3.5" rx="1" />
      <rect x="0" y="36" width="7" height="3.5" rx="1" />
      <rect x="49" y="16" width="7" height="3.5" rx="1" />
      <rect x="49" y="26" width="7" height="3.5" rx="1" />
      <rect x="49" y="36" width="7" height="3.5" rx="1" />
    </g>
    <g>
      <rect x="14" y="16" width="7" height="3.5" rx="1.75" fill="#60a5fa" />
      <rect x="24" y="16" width="18" height="3.5" rx="1.75" fill="#4ade80" />
      <rect x="14" y="24.5" width="7" height="3.5" rx="1.75" fill="#60a5fa" />
      <rect x="24" y="24.5" width="12" height="3.5" rx="1.75" fill="#fbbf24" />
      <rect x="14" y="33" width="7" height="3.5" rx="1.75" fill="#60a5fa" />
      <rect x="24" y="33" width="16" height="3.5" rx="1.75" fill="#4ade80" />
    </g>
    <circle cx="49" cy="49" r="3.5" fill="#4ade80" />
  </g>

  <!-- wordmark -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace">
    <text x="92" y="44" font-size="20" font-weight="600" fill="#e2e8f0">TaskMgr</text>
    <text x="92" y="66" font-size="13" font-weight="400" fill="#4ade80">Memory Simulator</text>
  </g>
</svg>
