<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Memory Simulator">
  <!-- App-themed favicon: a CPU/memory chip with register rows and a live-pulse dot,
       using the simulator's dark palette (bg #0d0f12, green #4ade80, blue #60a5fa). -->
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b22" />
      <stop offset="1" stop-color="#12161c" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#0d0f12" />

  <!-- chip body -->
  <rect x="14" y="14" width="36" height="36" rx="7" fill="url(#chip)" stroke="#2d3748" stroke-width="1.5" />

  <!-- chip pins -->
  <g fill="#374151">
    <rect x="22" y="8" width="3" height="6" rx="1" />
    <rect x="30.5" y="8" width="3" height="6" rx="1" />
    <rect x="39" y="8" width="3" height="6" rx="1" />
    <rect x="22" y="50" width="3" height="6" rx="1" />
    <rect x="30.5" y="50" width="3" height="6" rx="1" />
    <rect x="39" y="50" width="3" height="6" rx="1" />
    <rect x="8" y="22" width="6" height="3" rx="1" />
    <rect x="8" y="30.5" width="6" height="3" rx="1" />
    <rect x="8" y="39" width="6" height="3" rx="1" />
    <rect x="50" y="22" width="6" height="3" rx="1" />
    <rect x="50" y="30.5" width="6" height="3" rx="1" />
    <rect x="50" y="39" width="6" height="3" rx="1" />
  </g>

  <!-- register rows: a blue label tick + a coloured value bar each -->
  <g>
    <rect x="20" y="22" width="6" height="3" rx="1.5" fill="#60a5fa" />
    <rect x="28" y="22" width="16" height="3" rx="1.5" fill="#4ade80" />

    <rect x="20" y="29" width="6" height="3" rx="1.5" fill="#60a5fa" />
    <rect x="28" y="29" width="11" height="3" rx="1.5" fill="#fbbf24" />

    <rect x="20" y="36" width="6" height="3" rx="1.5" fill="#60a5fa" />
    <rect x="28" y="36" width="14" height="3" rx="1.5" fill="#4ade80" />
  </g>

  <!-- live pulse dot -->
  <circle cx="44" cy="44" r="3" fill="#4ade80">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
